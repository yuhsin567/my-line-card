<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的數位名片系統</title>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            background-color: #004c48;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 15px;
        }
        h1 {
            font-size: 20px;
            margin: 10px 0 5px;
            color: #111;
        }
        p {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px;
        }
        .btn-send {
            background-color: #004c48;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(0, 76, 72, 0.3);
            transition: all 0.2s ease;
        }
        .btn-send:hover {
            background-color: #003633;
            transform: translateY(-1px);
        }
        .status {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-placeholder">🪪</div>
    <h1>垣宣科技 數位名片分享器</h1>
    <p>點擊下方按鈕選擇好友，即可將「Avon 的雙頁數位名片」以你個人帳號名義直接傳送出去！</p>
    
    <button class="btn-send" id="sendBtn" onclick="shareCard()">傳送數位名片</button>
    
    <div class="status" id="statusMsg">系統初始化中...</div>
</div>

<script>
    // ⚠️ 請記得在這裡貼上你在 LINE Developers 拿到的 LIFF ID
    const MY_LIFF_ID = '2010548408-hYUgnhWX'; 

    document.addEventListener("DOMContentLoaded", function() {
        if (!MY_LIFF_ID || MY_LIFF_ID === 'YOUR_LIFF_ID_HERE') {
            updateStatus('❌ 請先在程式碼中設定你的 MY_LIFF_ID');
            document.getElementById('sendBtn').disabled = true;
            return;
        }
        
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                updateStatus('🟢 LINE 系統連線成功，隨時可以分享');
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            })
            .catch((err) => {
                updateStatus('❌ 系統初始化失敗: ' + err.message);
            });
    });

    function updateStatus(msg) {
        document.getElementById('statusMsg').innerText = msg;
    }

    function shareCard() {
        if (!liff.isApiAvailable('shareTargetPicker')) {
            alert('此帳號尚未開通 shareTargetPicker 權限，或不支援此環境發送。');
            return;
        }

        updateStatus('⏳ 正在開啟好友選擇清單...');

        liff.shareTargetPicker([
            {
                "type": "flex",
                "altText": "垣宣科技|Avon的數位名片",
                "contents": {
                    "type": "carousel",
                    "contents": [
                        {
                            "type": "bubble",
                            "hero": {
                                "type": "image",
                                "url": "https://i.imgur.com/9VOpTcB.png",
                                "size": "full",
                                "aspectRatio": "27:14",
                                "aspectMode": "cover",
                                "action": {
                                    "type": "uri",
                                    "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link"
                                }
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    {
                                        "type": "text",
                                        "text": "Avon 徐雅芳",
                                        "weight": "bold",
                                        "size": "xxl",
                                        "color": "#004c48"
                                    },
                                    {
                                        "type": "text",
                                        "text": "總監｜DIRECTOR · 垣宣科技",
                                        "size": "xs",
                                        "color": "#004c48",
                                        "margin": "sm",
                                        "wrap": true
                                    }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "sm",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "📨 信件聯絡｜Email",
                                            "uri": "mailto:avon.hsu@fateeternal.com"
                                        }
                                    },
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "📞 電話聯絡｜Phone",
                                            "uri": "tel:+886-953-880-797"
                                        }
                                    },
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "🔗 垣宣官網｜Website",
                                            "uri": "https://www.fateeternal.com/"
                                        }
                                    }
                                ]
                            }
                        },
                        {
                            "type": "bubble",
                            "hero": {
                                "type": "image",
                                "url": "https://i.imgur.com/9VOpTcB.png",
                                "size": "full",
                                "aspectRatio": "27:14",
                                "aspectMode": "cover",
                                "action": {
                                    "type": "uri",
                                    "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link"
                                }
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    {
                                        "type": "text",
                                        "text": "分享名片",
                                        "weight": "bold",
                                        "size": "xxl",
                                        "color": "#004c48"
                                    },
                                    {
                                        "type": "text",
                                        "text": "↑點擊LOGO儲存名片↑",
                                        "size": "xs",
                                        "color": "#004c48",
                                        "margin": "sm",
                                        "wrap": true
                                    }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "sm",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "✚ 加我好友",
                                            "uri": "https://line.me/ti/p/PvacePDt4N"
                                        }
                                    },
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "🪪 分享名片",
                                            "uri": "https://lihi.cc/ysEZt"
                                        }
                                    },
                                    {
                                        "type": "button",
                                        "style": "primary",
                                        "height": "sm",
                                        "color": "#004c48",
                                        "action": {
                                            "type": "uri",
                                            "label": "💬 垣宣官方LINE",
                                            "uri": "https://line.me/R/ti/p/@272olktr"
                                        }
                                    }
                                ]
                            }
                        }
                    ]
                }
            }
        ])
        .then((res) => {
            if (res) updateStatus('🟢 名片已成功分享發送！');
            else updateStatus('🟢 分享已取消');
        })
        .catch((err) => {
            updateStatus('❌ 發送失敗，請確認 Scopes 權限與 LINE 開關設定。');
            console.error(err);
        });
    }
</script>

</body>
</html>
