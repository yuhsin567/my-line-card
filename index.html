<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位名片中控台 (全端一鍵分享穩定版)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 22px;
            margin: 10px 0 5px;
            color: #111;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px;
        }
        .card-option {
            background: #ffffff;
            border: 2px solid #e1e4e8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            transition: all 0.2s ease;
        }
        .card-option:hover {
            border-color: #004c48;
            background-color: #fafdfd;
        }
        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            color: #111;
        }
        .card-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        .btn-send {
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .btn-avon { background-color: #004c48; box-shadow: 0 4px 10px rgba(0, 76, 72, 0.2); }
        .btn-avon:hover { background-color: #003633; }
        
        .btn-social { background-color: #1DB446; box-shadow: 0 4px 10px rgba(29, 180, 70, 0.2); }
        .btn-social:hover { background-color: #169a3a; }

        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🪪</div>
    <h1>我的數位名片中控台</h1>
    <p class="subtitle">請選擇您要分享的名片樣式：</p>
    
    <div class="card-option">
        <div class="card-title">💼 垣宣科技 | Avon 總監</div>
        <div class="card-desc">官方商兼名片（手機端直接發送雙頁卡片，電腦端一鍵喚起 LINE 轉發）。</div>
        <button class="btn-send btn-avon" id="btnAvon" onclick="shareCard('avon')" disabled>🚀 一鍵傳送商務名片</button>
    </div>
    
    <div class="card-option">
        <div class="card-title">☕ 過失超重 | 個人社交名片</div>
        <div class="card-desc">輕鬆的私人日常名片，單頁格式，全平台支援一鍵分享。</div>
        <button class="btn-send btn-social" id="btnSocial" onclick="shareCard('social')" disabled>🚀 一鍵傳送社交名片</button>
    </div>
    
    <div class="status" id="statusMsg">系統初始化中...</div>
</div>

<script>
    const MY_LIFF_ID = '2010548408-hYUgnhWX'; 
    let isMobileEnv = false;

    document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
                    isMobileEnv = true;
                    updateStatus('🟢 LINE 手機版連線成功');
                } else {
                    isMobileEnv = false;
                    updateStatus('🟢 LINE 電腦版相容模式已就緒');
                }
                enableButtons();
                if (liff.isInClient() && !liff.isLoggedIn()) {
                    liff.login();
                }
            })
            .catch((err) => {
                isMobileEnv = false;
                updateStatus('🟢 瀏覽器相容模式已就緒');
                enableButtons();
            });
    });

    function enableButtons() {
        document.getElementById('btnAvon').disabled = false;
        document.getElementById('btnSocial').disabled = false;
    }

    function updateStatus(msg) {
        document.getElementById('statusMsg').innerText = msg;
    }

    function shareCard(type) {
        // 📱 如果是手機 LINE App，執行最完美的原生 Flex 卡片好友挑選器
        if (isMobileEnv) {
            updateStatus('⏳ 正在開啟手機好友選擇清單...');
            
            let flexContents;
            let altTextText = "您收到了一張數位名片";

            if (type === 'avon') {
                altTextText = "垣宣科技|Avon的數位名片";
                flexContents = {
                    "type": "carousel",
                    "contents": [
                        {
                            "type": "bubble",
                            "hero": {
                                "type": "image",
                                "url": "https://i.imgur.com/9VOpTcB.png",
                                "size": "full",
                                "aspectRatio": "27:14",
                                "aspectMode": "cover",
                                "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "text", "text": "Avon 徐雅芳", "weight": "bold", "size": "xxl", "color": "#004c48" },
                                    { "type": "text", "text": "總監｜DIRECTOR · 垣宣科技", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "sm",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📨 信件聯絡｜Email", "uri": "mailto:avon.hsu@fateeternal.com" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📞 電話聯絡｜Phone", "uri": "tel:+886-953-880-797" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🔗 垣宣官網｜Website", "uri": "https://www.fateeternal.com/" } }
                                ]
                            }
                        },
                        {
                            "type": "bubble",
                            "hero": {
                                "type": "image",
                                "url": "https://i.imgur.com/9VOpTcB.png",
                                "size": "full",
                                "aspectRatio": "27:14",
                                "aspectMode": "cover",
                                "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "text", "text": "分享名片", "weight": "bold", "size": "xxl", "color": "#004c48" },
                                    { "type": "text", "text": "↑點擊LOGO儲存名片↑", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "sm",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "✚ 加我好友", "uri": "https://line.me/ti/p/PvacePDt4N" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🪪 分享名片", "uri": "https://lihi.cc/ysEZt" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "💬 垣宣官方LINE", "uri": "https://line.me/R/ti/p/@272olktr" } }
                                ]
                            }
                        }
                    ]
                };
            } else if (type === 'social') {
                altTextText = "過失超重的日常|個人名片";
                flexContents = {
                    "type": "bubble",
                    "body": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "text", "text": "過失超重", "weight": "bold", "color": "#1DB446", "size": "sm" },
                            { "type": "text", "text": "過失超重", "weight": "bold", "size": "xl", "margin": "md" },
                            { "type": "text", "text": "這是我的個人社交名片，很高興認識你！", "size": "xs", "color": "#aaaaaa", "wrap": true, "margin": "sm" }
                        ]
                    },
                    "footer": {
                        "type": "box",
                        "layout": "vertical",
                        "contents": [
                            { "type": "button", "style": "primary", "color": "#1DB446", "action": { "type": "uri", "label": "✚ 加我個人 LINE", "uri": "https://line.me/ti/p/PvacePDt4N" } }
                        ]
                    }
                };
            }

            liff.shareTargetPicker([
                { "type": "flex", "altText": altTextText, "contents": flexContents }
            ])
            .then((res) => {
                if (res) updateStatus('🟢 名片已成功分享發送！');
                else updateStatus('🟢 分享已取消');
            })
            .catch((err) => { updateStatus('❌ 發送失敗：' + err.message); });
        } 
        // 💻 如果是電腦版，直接啟動最乾淨的純網址轉發模式（絕不跳掉、絕對成功）
        else {
            updateStatus('⏳ 正在喚起電腦版 LINE 分享功能...');
            
            // 直接分享你的名片中控台網址，乾淨、不超標、絕對不跳掉！
            const targetUrl = `https://liff.line.me/${MY_LIFF_ID}`;
            const pcShareUrl = `https://line.me/R/share?text=${encodeURIComponent('您好！這是我的數位名片，請多指教：\n' + targetUrl)}`;
            
            window.open(pcShareUrl, '_blank');
            updateStatus('🟢 已成功喚起電腦版 LINE 分享！');
        }
    }
</script>

</body>
</html>
