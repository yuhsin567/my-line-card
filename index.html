<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位名片中控台 (一鍵全端支援版)</title>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 22px;
            margin: 10px 0 5px;
            color: #111;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px;
        }
        .card-option {
            background: #ffffff;
            border: 2px solid #e1e4e8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            transition: all 0.2s ease;
        }
        .card-option:hover {
            border-color: #004c48;
            background-color: #fafdfd;
        }
        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            color: #111;
        }
        .card-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        .btn-send {
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .btn-avon { background-color: #004c48; box-shadow: 0 4px 10px rgba(0, 76, 72, 0.2); }
        .btn-avon:hover { background-color: #003633; }
        
        .btn-social { background-color: #1DB446; box-shadow: 0 4px 10px rgba(29, 180, 70, 0.2); }
        .btn-social:hover { background-color: #169a3a; }

        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🪪</div>
    <h1>我的數位名片中控台</h1>
    <p class="subtitle">一鍵分享專屬名片：<br><small style="color:#888;">(已開通手機/電腦端自動優化)</small></p>
    
    <!-- 名片選項 1：垣宣科技 Avon -->
    <div class="card-option">
        <div class="card-title">💼 垣宣科技 | Avon 總監</div>
        <div class="card-desc">官方商務名片 (手機端自動發送雙頁版，電腦端自動發送精簡一鍵版)。</div>
        <button class="btn-send btn-avon" id="btnAvon" onclick="shareCard('avon')" disabled>🚀 一鍵傳送商務名片</button>
    </div>
    
    <!-- 名片選項 2：過失超重 個人名片 -->
    <div class="card-option">
        <div class="card-title">☕ 過失超重 | 個人社交名片</div>
        <div class="card-desc">輕鬆的私人日常名片，單頁格式，全端皆支援直接一鍵分享。</div>
        <button class="btn-send btn-social" id="btnSocial" onclick="shareCard('social')" disabled>🚀 一鍵傳送社交名片</button>
    </div>
    
    <div class="status" id="statusMsg">系統初始化中...</div>
</div>

<script>
    const MY_LIFF_ID = '2010548408-hYUgnhWX'; 
    let isMobileEnv = false;

    document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                // 判斷是否在手機 LINE App 原生環境中
                if (liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
                    isMobileEnv = true;
                    updateStatus('🟢 LINE 手機版連線成功');
                } else {
                    isMobileEnv = false;
                    updateStatus('💻 電腦版相容模式已就緒');
                }
                document.getElementById('btnAvon').disabled = false;
                document.getElementById('btnSocial').disabled = false;
                
                if (liff.isInClient() && !liff.isLoggedIn()) {
                    liff.login();
                }
            })
            .catch((err) => {
                isMobileEnv = false;
                updateStatus('💻 電腦瀏覽器模式已就緒');
                document.getElementById('btnAvon').disabled = false;
                document.getElementById('btnSocial').disabled = false;
            });
    });

    function updateStatus(msg) {
        document.getElementById('statusMsg').innerText = msg;
    }

    // 完美的單頁 Bubble 骨架（供電腦版或精簡版使用）
    function getSingleBubbleJSON() {
        return {
            "type": "bubble",
            "hero": {
                "type": "image",
                "url": "https://i.imgur.com/9VOpTcB.png",
                "size": "full",
                "aspectRatio": "27:14",
                "aspectMode": "cover",
                "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
            },
            "body": {
                "type": "box",
                "layout": "vertical",
                "backgroundColor": "#ffffff",
                "contents": [
                    { "type": "text", "text": "Avon 徐雅芳", "weight": "bold", "size": "xxl", "color": "#004c48" },
                    { "type": "text", "text": "總監｜DIRECTOR · 垣宣科技", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                ]
            },
            "footer": {
                "type": "box",
                "layout": "vertical",
                "spacing": "sm",
                "backgroundColor": "#ffffff",
                "contents": [
                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📨 信件聯絡｜Email", "uri": "mailto:avon.hsu@fateeternal.com" } },
                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📞 電話聯絡｜Phone", "uri": "tel:+886-953-880-797" } },
                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🔗 垣宣官網｜Website", "uri": "https://www.fateeternal.com/" } }
                ]
            }
        };
    }

    function shareCard(type) {
        let flexContents;
        let altTextText = "您收到了一張數位名片";

        if (type === 'avon') {
            altTextText = "垣宣科技|Avon的數位名片";
            
            // 🧠 核心關鍵：根據環境切換 JSON 大小
            if (isMobileEnv) {
                // 手機端：字數容忍度高，發送完美的雙頁版 Carousel
                flexContents = {
                    "type": "carousel",
                    "contents": [
                        getSingleBubbleJSON(),
                        {
                            "type": "bubble",
                            "hero": {
                                "type": "image",
                                "url": "https://i.imgur.com/9VOpTcB.png",
                                "size": "full",
                                "aspectRatio": "27:14",
                                "aspectMode": "cover",
                                "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
                            },
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "text", "text": "分享名片", "weight": "bold", "size": "xxl", "color": "#004c48" },
                                    { "type": "text", "text": "↑點擊LOGO儲存名片↑", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "spacing": "sm",
                                "backgroundColor": "#ffffff",
                                "contents": [
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "✚ 加我好友", "uri": "https://line.me/ti/p/PvacePDt4N" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🪪 分享名片", "uri": "https://lihi.cc/ysEZt" } },
                                    { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "💬 垣宣官方LINE", "uri": "https://line.me/R/ti/p/@272olktr" } }
                                ]
                            }
                        }
                    ]
                };
            } else {
                // 電腦端：壓縮字數，發送精簡一鍵版，確保 LINE 伺服器順利收單
                flexContents = getSingleBubbleJSON();
            }
        } else if (type === 'social') {
            altTextText = "過失超重的日常|個人名片";
            flexContents = {
                "type": "bubble",
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [
                        { "type": "text", "text": "過失超重", "weight": "bold", "color": "#1DB446", "size": "sm" },
                        { "type": "text", "text": "過失超重", "weight": "bold", "size": "xl", "margin": "md" },
                        { "type": "text", "text": "這是我的個人社交名片，很高興認識你！", "size": "xs", "color": "#aaaaaa", "wrap": true, "margin": "sm" }
                    ]
                },
                "footer": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [
                        { "type": "button", "style": "primary", "color": "#1DB446", "action": { "type": "uri", "label": "✚ 加我個人 LINE", "uri": "https://line.me/ti/p/PvacePDt4N" } }
                    ]
                }
            };
        }

        // 📱 如果在手機 LINE App 內，直接啟用極速原生分享
        if (isMobileEnv) {
            updateStatus('⏳ 正在開啟手機好友清單...');
            liff.shareTargetPicker([
                { "type": "flex", "altText": altTextText, "contents": flexContents }
            ])
            .then((res) => {
                if (res) updateStatus('🟢 名片已成功分享！');
                else updateStatus('🟢 分享已取消');
            })
            .catch((err) => { updateStatus('❌ 發送失敗：' + err.message); });
        } 
        // 💻 如果在電腦上點擊，利用優化後的精簡網址引導直接開啟電腦版 LINE 傳送！
        else {
            updateStatus('⏳ 正在為您喚起電腦版 LINE 分享視窗...');
            
            const jsonStr = JSON.stringify({
                "type": "flex",
                "altText": altTextText,
                "contents": flexContents
            });
            // 轉化為安全、未超長度上限的加密編碼
            const base64Data = btoa(unescape(encodeURIComponent(jsonStr)));
            
            // 呼叫電腦版原生轉發機制
            const pcShareUrl = `https://line.me/R/share?text=${encodeURIComponent('https://liff.line.me/' + MY_LIFF_ID + '/share-pc.html?d=' + base64Data)}`;
            
            window.open(pcShareUrl, '_blank');
            updateStatus('🟢 已成功喚起電腦版分享！');
        }
    }
</script>

</body>
</html>
