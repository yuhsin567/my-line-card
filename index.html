<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位名片中控台 (雙端優化版)</title>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 22px;
            margin: 10px 0 5px;
            color: #111;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px;
        }
        .card-option {
            background: #ffffff;
            border: 2px solid #e1e4e8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            transition: all 0.2s ease;
        }
        .card-option:hover {
            border-color: #004c48;
            background-color: #fafdfd;
        }
        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            color: #111;
        }
        .card-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
        }
        .btn-send {
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .btn-avon { background-color: #004c48; box-shadow: 0 4px 10px rgba(0, 76, 72, 0.2); }
        .btn-avon:hover { background-color: #003633; }
        
        .btn-social { background-color: #1DB446; box-shadow: 0 4px 10px rgba(29, 180, 70, 0.2); }
        .btn-social:hover { background-color: #169a3a; }

        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 10px;
            line-height: 1.5;
        }
        .pc-notice {
            background: #fff9db;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">🪪</div>
    <h1>我的數位名片中控台</h1>
    <p class="subtitle">請選擇您要在目前場合分享的名片樣式：</p>
    
    <!-- 名片選項 1：垣宣科技 Avon -->
    <div class="card-option">
        <div class="card-title">💼 垣宣科技 | Avon 總監</div>
        <div class="card-desc">官方商務名片，雙頁 Carousel 格式，含官網、Email、電話與官方 LINE 連結。</div>
        <button class="btn-send btn-avon" id="btnAvon" onclick="shareCard('avon')" disabled>傳送商務名片</button>
    </div>
    
    <!-- 名片選項 2：過失超重 個人名片 -->
    <div class="card-option">
        <div class="card-title">☕ 過失超重 | 個人社交名片</div>
        <div class="card-desc">輕鬆的私人日常名片，單頁 Bubble 格式，方便交換個人 LINE 帳號。</div>
        <button class="btn-send btn-social" id="btnSocial" onclick="shareCard('social')" disabled>傳送社交名片</button>
    </div>

    <!-- 電腦版專用提示區 -->
    <div class="pc-notice" id="pcNotice">
        💡 <b>電腦版提示：</b><br>
        名片 JSON 代碼已成功複製到您的剪貼簿！<br>
        請點擊前往 <a href="https://lihi.cc/ysEZt" target="_blank" style="color:#004c48; font-weight:bold; text-decoration:underline;">Flex 訊息發送器</a>，將代碼貼上即可從電腦轉發給任何好友！
    </div>
    
    <div class="status" id="statusMsg">系統初始化中...</div>
</div>

<script>
    const MY_LIFF_ID = '2010548408-hYUgnhWX'; 
    let isMobileEnv = false;

    document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                // 檢查是否支援原生的 shareTargetPicker (判斷是否為手機 LINE 環境)
                if (liff.isApiAvailable && liff.isApiAvailable('shareTargetPicker')) {
                    isMobileEnv = true;
                    updateStatus('🟢 LINE 手機版連線成功，按鈕可直接分享！');
                } else {
                    isMobileEnv = false;
                    updateStatus('💻 偵測到電腦環境，已切換為「一鍵複製代碼」模式。');
                }
                enableButtons();
                if (liff.isInClient() && !liff.isLoggedIn()) {
                    liff.login();
                }
            })
            .catch((err) => {
                // 一般電腦瀏覽器開啟
                isMobileEnv = false;
                updateStatus('💻 電腦瀏覽器相容模式已就緒。');
                enableButtons();
            });
    });

    function enableButtons() {
        document.getElementById('btnAvon').disabled = false;
        document.getElementById('btnSocial').disabled = false;
        
        // 如果是電腦版，把按鈕文字改得更直覺
        if (!isMobileEnv) {
            document.getElementById('btnAvon').innerText = '📋 複製商務名片代碼';
            document.getElementById('btnSocial').innerText = '📋 複製社交名片代碼';
        }
    }

    function updateStatus(msg) {
        document.getElementById('statusMsg').innerHTML = msg;
    }

    function shareCard(type) {
        let flexContents;
        let altTextText = "您收到了一張數位名片";

        if (type === 'avon') {
            altTextText = "垣宣科技|Avon的數位名片";
            flexContents = {
                "type": "carousel",
                "contents": [
                    {
                        "type": "bubble",
                        "hero": {
                            "type": "image",
                            "url": "https://i.imgur.com/9VOpTcB.png",
                            "size": "full",
                            "aspectRatio": "27:14",
                            "aspectMode": "cover",
                            "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
                        },
                        "body": {
                            "type": "box",
                            "layout": "vertical",
                            "backgroundColor": "#ffffff",
                            "contents": [
                                { "type": "text", "text": "Avon 徐雅芳", "weight": "bold", "size": "xxl", "color": "#004c48" },
                                { "type": "text", "text": "總監｜DIRECTOR · 垣宣科技", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                            ]
                        },
                        "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "spacing": "sm",
                            "backgroundColor": "#ffffff",
                            "contents": [
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📨 信件聯絡｜Email", "uri": "mailto:avon.hsu@fateeternal.com" } },
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "📞 電話聯絡｜Phone", "uri": "tel:+886-953-880-797" } },
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🔗 垣宣官網｜Website", "uri": "https://www.fateeternal.com/" } }
                            ]
                        }
                    },
                    {
                        "type": "bubble",
                        "hero": {
                            "type": "image",
                            "url": "https://i.imgur.com/9VOpTcB.png",
                            "size": "full",
                            "aspectRatio": "27:14",
                            "aspectMode": "cover",
                            "action": { "type": "uri", "uri": "https://drive.google.com/file/d/1enDO9w3OJIIM1AZbWL7uWpCpVAa875Vn/view?usp=drive_link" }
                        },
                        "body": {
                            "type": "box",
                            "layout": "vertical",
                            "backgroundColor": "#ffffff",
                            "contents": [
                                { "type": "text", "text": "分享名片", "weight": "bold", "size": "xxl", "color": "#004c48" },
                                { "type": "text", "text": "↑點擊LOGO儲存名片↑", "size": "xs", "color": "#004c48", "margin": "sm", "wrap": true }
                            ]
                        },
                        "footer": {
                            "type": "box",
                            "layout": "vertical",
                            "spacing": "sm",
                            "backgroundColor": "#ffffff",
                            "contents": [
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "✚ 加我好友", "uri": "https://line.me/ti/p/PvacePDt4N" } },
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "🪪 分享名片", "uri": "https://lihi.cc/ysEZt" } },
                                { "type": "button", "style": "primary", "height": "sm", "color": "#004c48", "action": { "type": "uri", "label": "💬 垣宣官方LINE", "uri": "https://line.me/R/ti/p/@272olktr" } }
                            ]
                        }
                    }
                ]
            };
        } else if (type === 'social') {
            altTextText = "過失超重的日常|個人名片";
            flexContents = {
                "type": "bubble",
                "body": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [
                        { "type": "text", "text": "過失超重", "weight": "bold", "color": "#1DB446", "size": "sm" },
                        { "type": "text", "text": "過失超重", "weight": "bold", "size": "xl", "margin": "md" },
                        { "type": "text", "text": "這是我的個人社交名片，很高興認識你！", "size": "xs", "color": "#aaaaaa", "wrap": true, "margin": "sm" }
                    ]
                },
                "footer": {
                    "type": "box",
                    "layout": "vertical",
                    "contents": [
                        { "type": "button", "style": "primary", "color": "#1DB446", "action": { "type": "uri", "label": "✚ 加我個人 LINE", "uri": "https://line.me/ti/p/PvacePDt4N" } }
                    ]
                }
            };
        }

        // 📱 手機環境：正常呼叫好友選單
        if (isMobileEnv) {
            updateStatus('⏳ 正在開啟手機好友選擇清單...');
            liff.shareTargetPicker([
                { "type": "flex", "altText": altTextText, "contents": flexContents }
            ])
            .then((res) => {
                if (res) updateStatus('🟢 名片已成功分享發送！');
                else updateStatus('🟢 分享已取消');
            })
            .catch((err) => { updateStatus('❌ 發送失敗：' + err.message); });
        } 
        // 💻 電腦環境：一鍵複製格式化後的完美 JSON
        else {
            const finalJSON = JSON.stringify({
                "type": "flex",
                "altText": altTextText,
                "contents": flexContents
            }, null, 2);

            // 複製到剪貼簿
            navigator.clipboard.writeText(finalJSON).then(() => {
                document.getElementById('pcNotice').style.display = 'block';
                updateStatus('📋 <b>代碼複製成功！</b> 請看下方黃色提示框的操作指引。');
            }).catch((err) => {
                alert('複製失敗，請手動複製控制台資料。');
            });
        }
    }
</script>

</body>
</html>
